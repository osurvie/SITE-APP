<body>

  <div id="site-nav-mount"></div>


  <main>
    <form id="contactForm" action="https://formspree.io/f/xqallylp" method="POST">
      <label for="name">Nom complet *</label>
      <input type="text" id="name" name="Nom" required placeholder="Votre nom complet" />

      <label for="email">Adresse e-mail *</label>
      <input type="email" id="email" name="Email" required placeholder="Votre email" />

      <label for="message">Message *</label>
      <textarea id="message" name="Message" required placeholder="Votre message"></textarea>

      <button type="submit">Envoyer</button>
    </form>

    <div id="confirmationMessage">Merci pour votre message !</div>

    <div class="contact-info">
      <p><strong>Email :</strong> <a href="mailto:contact@osurvie.fr">contact@osurvie.fr</a></p>
      <p><strong>Adresse :</strong> 6, Square du 8 Mai 1945, 93140 Bondy, France</p>
            <p><strong>Téléphone :</strong> Le contact téléphonique se fait uniquement sur rendez-vous.</p>
    </div>
  </main>

  <script>
    const form = document.getElementById('contactForm');
    const confirmation = document.getElementById('confirmationMessage');

    form.addEventListener('submit', function(event) {
      event.preventDefault(); // Bloquer le comportement par défaut

      const formData = new FormData(form);

      fetch(form.action, {
        method: form.method,
        body: formData,
        headers: {
          'Accept': 'application/json'
        }
      }).then(response => {
        if (response.ok) {
          form.style.display = 'none';  // Cacher le formulaire
          confirmation.style.display = 'block'; // Afficher le message de confirmation
        } else {
          response.json().then(data => {
            if (data.errors) {
              alert(data.errors.map(error => error.message).join(", "));
            } else {
              alert("Une erreur est survenue lors de l'envoi.");
            }
          });
        }
      }).catch(error => {
        alert("Erreur réseau, veuillez réessayer plus tard.");
      });
    });
  </script>
